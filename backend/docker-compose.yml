version: "3.9"

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - mentor-net

  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    networks:
      - mentor-net

  user_service:
    build:
      context: ./user_service
    container_name: user_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/users_db
      SECRET_KEY: supersecret
    depends_on:
      - db
    networks:
      - mentor-net
    volumes:
      - pgdata:/var/lib/postgresql/data


  learning_service:
    build: ./learning_service
    container_name: learning_service
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - user_service
    networks:
        - mentor-net
  
  scaffolding_service:
    build: ./scaffolding_service
    container_name: scaffolding_service
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8003:8003"
    depends_on:
      - redis
      - learning_service
      - user_service
    networks:
        - mentor-net

  task_manager1:
    build: 
      context: ./task_manager1
    container_name: task_manager1
    ports:
      - "8004:8004"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
      - user_service
    networks:
      - mentor-net

  sandbox_service:
    build:
      context: ./sandbox_service
    container_name: sandbox_service
    ports:
      - "8005:8005"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - mentor-net

  mentor_service:
    build:
      context: ./mentor_service
    container_name: mentor_service
    ports:
      - "8006:8006"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - mentor-net

  analitics_service:
    build:
      context: ./analitics_service
    container_name: analitics_service
    ports:
      - "8007:8007"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - mentor-net

  progress_service:
    build:
      context: ./progress_service
    container_name: progress_service
    ports:
      - "8008:8008"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - mentor-net



networks:
  mentor-net:
    driver: bridge

volumes:
  pgdata: